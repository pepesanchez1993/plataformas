<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#2e8b57">
<title>Gimnasio · En construcción</title>
<style>
:root{--bg:#16140f;--ink:#f3ece0;--muted:#a89f8d;--green:#2e8b57;
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;gap:14px;
  background-image:radial-gradient(circle at 1px 1px,rgba(46,139,87,.07) 1px,transparent 0);background-size:22px 22px;}
.ico{font-size:3.4rem}
h1{font-family:var(--serif);font-size:clamp(2rem,7vw,2.8rem);font-weight:600}
p{color:var(--muted);max-width:34ch;line-height:1.6}
a{margin-top:10px;color:var(--green);text-decoration:none;font-weight:600;
  border:1px solid color-mix(in srgb,var(--green) 45%,transparent);padding:10px 20px;border-radius:12px;
  transition:background .2s}
a:hover{background:color-mix(in srgb,var(--green) 14%,transparent)}
</style>
</head>
<body>
  <div class="ico">🏋️</div>
  <h1>Gimnasio</h1>
  <p>Esta plataforma se está construyendo. Pronto tendrás aquí tus rutinas y el seguimiento de entrenamiento.</p>
  <a href="../">← Volver al panel</a>
</body>
</html>
